<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 片段播放工具</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f5f5f5; }
    .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #ff0000; color: white; font-size: 16px; cursor: pointer; }
    button:hover { background: #cc0000; }
    #player { margin-top: 20px; text-align:center; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎬 YouTube 片段播放工具</h2>

    <label>影片網址：</label>
    <input type="text" id="url" placeholder="貼上 YouTube 連結">

    <label>開始時間（分:秒）：</label>
    <input type="text" id="start" placeholder="例如 4:28">

    <label>結束時間（分:秒）：</label>
    <input type="text" id="end" placeholder="例如 8:48">

    <button onclick="loadVideo()">開始播放</button>

    <div id="player"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    let stopTime = 0;
    let checkInterval = null;
    let currentVideoId = null;

    function extractVideoID(url) {
      const regExp = /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;
      const match = url.match(regExp);
      return match ? match[1] : null;
    }

    function timeToSeconds(timeStr) {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      if (parts.length === 1) return parseInt(parts[0]) || 0;
      const minutes = parseInt(parts[0]) || 0;
      const seconds = parseInt(parts[1]) || 0;
      return minutes * 60 + seconds;
    }

    function loadVideo() {
      const url = document.getElementById('url').value;
      const startStr = document.getElementById('start').value;
      const endStr = document.getElementById('end').value;

      const start = timeToSeconds(startStr);
      stopTime = timeToSeconds(endStr);

      const videoId = extractVideoID(url);
      if (!videoId) {
        alert('請輸入正確的 YouTube 網址');
        return;
      }

      // 清除舊計時器（關鍵修正）
      if (checkInterval) {
        clearInterval(checkInterval);
        checkInterval = null;
      }

      // 如果是不同影片 → 直接銷毀重建（最穩定）
      if (player && currentVideoId !== videoId) {
        player.destroy();
        player = null;
      }

      currentVideoId = videoId;

      // 建立或重新載入影片
      if (!player) {
        player = new YT.Player('player', {
          height: '315',
          width: '560',
          videoId: videoId,
          playerVars: {
            start: start
          },
          events: {
            'onReady': function(event) {
              event.target.seekTo(start, true);
              event.target.playVideo();
              startCheckTime();
            }
          }
        });
      } else {
        // 強制重播（關鍵修正）
        player.loadVideoById(videoId, start);
        setTimeout(() => {
          player.seekTo(start, true);
          player.playVideo();
          startCheckTime();
        }, 300);
      }
    }

    function startCheckTime() {
      checkInterval = setInterval(function() {
        if (!player || stopTime <= 0) return;

        const current = player.getCurrentTime();

        if (current >= stopTime) {
          player.pauseVideo();
          clearInterval(checkInterval);
          checkInterval = null;
        }
      }, 200);
    }
  </script>
</body>
</html>
