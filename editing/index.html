<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube自然課片段播放工具</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f0f4f8; }
    .container { max-width: 700px; margin: auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 12px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #1c75bc; color: white; font-size: 18px; cursor: pointer; margin-top: 10px; }
    button:hover { background: #155a8a; }
    #player { margin-top: 25px; text-align:center; }
    .info { font-size: 14px; color: #555; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎓 自然課YouTube區段播放</h2>

    <div class="info">請輸入影片網址與播放片段，系統會自動從指定時間開始，並在結束時間自動停止。</div>

    <label>影片網址：</label>
    <input type="text" id="url" placeholder="貼上 YouTube 連結">

    <label>開始時間（分:秒）：</label>
    <input type="text" id="start" placeholder="例如 4:28">

    <label>結束時間（分:秒）：</label>
    <input type="text" id="end" placeholder="例如 8:48">

    <button onclick="loadVideo()">開始播放</button>

    <div id="player"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    let stopTime = 0;
    let checkInterval = null;
    let currentVideoId = null;

    function extractVideoID(url) {
      const regExp = /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;
      const match = url.match(regExp);
      return match ? match[1] : null;
    }

    function timeToSeconds(timeStr) {
      if (!timeStr) return 0;
      const parts = timeStr.split(':');
      if (parts.length === 1) return parseInt(parts[0]) || 0;
      const minutes = parseInt(parts[0]) || 0;
      const seconds = parseInt(parts[1]) || 0;
      return minutes * 60 + seconds;
    }

    function loadVideo() {
      const url = document.getElementById('url').value;
      const startStr = document.getElementById('start').value;
      const endStr = document.getElementById('end').value;

      const start = timeToSeconds(startStr);
      stopTime = timeToSeconds(endStr);

      const videoId = extractVideoID(url);
      if (!videoId) {
        alert('請輸入正確的 YouTube 網址');
        return;
      }

      // 清除舊的計時器
      if (checkInterval) { clearInterval(checkInterval); checkInterval = null; }

      // 如果是不同影片 → 銷毀播放器重建
      if (player && currentVideoId !== videoId) {
        player.destroy();
        player = null;
      }
      currentVideoId = videoId;

      if (!player) {
        player = new YT.Player('player', {
          height: '390',
          width: '640',
          videoId: videoId,
          playerVars: {
            start: start,
            controls: 1,       // 顯示控制列
            modestbranding: 1, // 簡化 YouTube logo
            rel: 0,            // 影片結束不推薦其他影片
            disablekb: 1       // 禁止鍵盤控制避免跳過
          },
          events: {
            'onReady': function(event) {
              event.target.seekTo(start, true);
              event.target.playVideo();
              startCheckTime();
            },
            'onStateChange': function(event) {
              if(event.data === YT.PlayerState.ENDED){
                clearInterval(checkInterval);
                checkInterval = null;
              }
            }
          }
        });
      } else {
        // 重新播放同一影片片段
        player.loadVideoById(videoId, start);
        setTimeout(() => {
          player.seekTo(start, true);
          player.playVideo();
          startCheckTime();
        }, 300);
      }
    }

    function startCheckTime() {
      checkInterval = setInterval(function() {
        if (!player || stopTime <= 0) return;
        const current = player.getCurrentTime();
        if (current >= stopTime) {
          player.pauseVideo();
          clearInterval(checkInterval);
          checkInterval = null;
        }
        // 避免拖曳超出片段範圍
        const start = timeToSeconds(document.getElementById('start').value);
        if(current < start - 1){
          player.seekTo(start, true);
        }
      }, 200);
    }
  </script>
</body>
</html>
